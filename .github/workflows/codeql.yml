# SPDX-License-Identifier: AGPL-3.0-or-later
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 4 * * 1" # weekly, Monday 04:37 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # P1-3 (CICD-19/20): `actions` scans the workflow YAML itself — a
        # different query/engine surface than zizmor — alongside the existing
        # `python` analysis of the application code.
        include:
          - language: python
            queries: security-extended
          - language: actions
            queries: "" # security-extended is not a published suite for `actions`; use defaults
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          queries: ${{ matrix.queries }}
      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"
