# SPDX-License-Identifier: AGPL-3.0-or-later
name: i18n

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: i18n-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: EN/ES locale key-parity (merge gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      # The checker is standard-library only and offline, so no dependency
      # install or uv sync is needed — the runner's built-in python3 suffices.
      - name: Check EN/ES bundle parity
        run: python3 scripts/check_i18n_parity.py
