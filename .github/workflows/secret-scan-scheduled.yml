# Scheduled full-history secret scan (SEC-17/18/19, third of three gates: CI diff
# gate in ci.yml, pre-commit gate in .pre-commit-config.yaml, and this one).
#
# The CI diff gate only ever sees the commits in a single push/PR; a secret
# committed further back in history and later removed would never trip it. This
# job walks the *entire* history weekly, in verified-credentials mode, and fails
# loudly (job failure + GitHub Actions' own scheduled-run failure notification).
name: secret-scan-scheduled

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog-full-history:
    name: TruffleHog full-history scan (verified credentials only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run TruffleHog over the full git history
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          # No base/head: on schedule/workflow_dispatch the action scans the
          # whole repository history, not a diff.
          extra_args: --results=verified --no-update
